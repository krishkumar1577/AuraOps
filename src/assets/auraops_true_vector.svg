<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      .stroke { fill: none; stroke: black; stroke-width: 28; stroke-linecap: round; stroke-linejoin: round; }
      .text { font-family: 'Geist Mono', monospace; font-size: 48px; letter-spacing: 6px; text-anchor: middle; }
    </style>
  </defs>

  <!-- Symbol -->
  <!-- Triangle-like A -->
  <path class="stroke" d="M120 340 L256 120 L392 340" />

  <!-- Cross/loop forming O -->
  <circle class="stroke" cx="300" cy="300" r="90"/>

  <!-- Connecting loop stroke -->
  <path class="stroke" d="M180 320 C240 260, 340 260, 380 320" />

  <!-- Text -->
  <text x="256" y="470" class="text">AURAOPS</text>
</svg>
