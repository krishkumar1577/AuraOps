<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AuraOps</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #080808;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: 'DM Mono', monospace;
  overflow: hidden;
}

/* ── GRID BACKGROUND ── */
.grid {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0.035;
}

.logo-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 36px;
}

/* ── SVG ── */
svg {
  width: 220px;
  height: 260px;
  overflow: visible;
}

/* ── MAIN DRAW ── */
#main {
  stroke-dasharray: 1;
  stroke-dashoffset: 1;
  animation: drawMain 1.4s cubic-bezier(0.65,0,0.35,1) forwards;
}

/* ── SLASH ── */
#slash {
  stroke-dasharray: 1;
  stroke-dashoffset: 1;
  animation: drawSlash 0.6s cubic-bezier(0.65,0,0.35,1) 1.1s forwards;
}

/* ── WORDMARK ── */
.wordmark {
  font-size: 13px;
  letter-spacing: 9px;
  font-weight: 500;
  color: rgba(255,255,255,0);
  text-transform: uppercase;
  text-indent: 9px;
  animation: fadeWord 0.6s ease 1.6s forwards;
}

/* ── ANIMATIONS ── */
@keyframes drawMain {
  to { stroke-dashoffset: 0; }
}

@keyframes drawSlash {
  to { stroke-dashoffset: 0; }
}

@keyframes fadeWord {
  to { color: rgba(255,255,255,0.72); }
}

/* ── IDLE MOTION (PREMIUM FEEL) ── */
.logo {
  animation: idle 5s ease-in-out infinite;
  animation-delay: 1.8s;
}

@keyframes idle {
  0%,100% {
    transform: scale(1);
    opacity: 1;
  }
  50% {
    transform: scale(1.025);
    opacity: 0.94;
  }
}

/* ── HOVER INTERACTION ── */
.logo:hover {
  animation: none;
  transform: scale(1.05);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

</style>
</head>

<body>

<!-- GRID -->
<svg class="grid">
  <defs>
    <pattern id="gridPattern" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0 L0 0 0 32" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#gridPattern)"/>
</svg>

<div class="logo-wrap">

  <!-- LOGO -->
  <svg class="logo" viewBox="0 0 240 280" fill="none">

    <!-- MAIN SHAPE -->
    <path id="main"
      d="
      M40 240 
      L110 70 
      L200 240

      M130 110
      A60 60 0 1 1 129.9 110
      "
      stroke="white"
      stroke-width="8"
      stroke-linecap="round"
      stroke-linejoin="round"
      pathLength="1"
    />

    <!-- SLASH -->
    <path id="slash"
    d="M62 240 Q118 175 179 200"
    stroke="white"
    stroke-width="8"
    stroke-linecap="round"
   pathLength="1"
    />
    

  </svg>

  <!-- TEXT -->
  <div class="wordmark">AURAOPS</div>

</div>

</body>
</html>
